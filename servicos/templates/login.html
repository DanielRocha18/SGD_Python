<body>
    <!-- Fundo animado com particles.js -->

    <div class="login-container">

                <div class="logo-container2">
        <img src="{{ url_for('static', filename='img/logo_central_azul.png') }}" alt="Logo CENTRAL" class="logo-img">
    </div>
                <!-- <h1 style="color: #0061a6">Sistema de Controle de Telefonia</h1> -->
                <!-- <p>Faça login para acessar o sistema</p> -->
            </div>

            <br>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="notification alert alert-danger">

            </div>

                        <form action="{{url_for('login')}}" method="post" class="needs-validation" novalidate>
                <!-- Usuário com form-floating -->
                <div class="form-floating mb-4">
                    <input type="text" class="form-control custom-input" id="usuario" name="usuario"
                        placeholder="Digite seu usuário" required>
                    <label for="usuario"><i class="fas fa-user icon-left"></i>Usuário</label>
                    <span class="tooltip-icon" data-bs-toggle="tooltip" data-bs-placement="top"

                </div>

                <!-- Senha com form-floating -->
                <div class="form-floating mb-4">
                    <input type="password" class="form-control custom-input" id="senha" name="senha"
                        placeholder="Digite sua senha" required>
                    <label for="senha"><i class="fas fa-lock icon-left"></i>Senha</label>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-login" type="submit">
                        Entrar
                    </button>
                </div>
            </form>


            <div class="login-footer">
                <img src="{{ url_for('static', filename='img/logooficial.png') }}" alt="Logo GDF" class="login-footer">
                </a>
            </div>
        </div>
    </div>
 

    <footer class="main-footer">
        <div class="container">
            <span>Desenvolvido pela Unidade de Tecnologia da Informação e Comunicação - UNITEC</span>
        </div>
    </footer>

    <!-- Bootstrap 5 JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script de validação -->
    <script>
        // Example starter JavaScript for disabling form submissions if there are invalid fields
        (function () {
            'use strict';
            window.addEventListener('load', function () {
                // Fetch all the forms we want to apply custom Bootstrap validation styles to
                var forms = document.getElementsByClassName('needs-validation');
                // Loop over them and prevent submission
                var validation = Array.prototype.filter.call(forms, function (form) {
                    form.addEventListener('submit', function (event) {
                        if (form.checkValidity() === false) {
                            event.preventDefault();
                            event.stopPropagation();
                        }
                        form.classList.add('was-validated');
                    }, false);
                });

                // Initialize tooltips
                var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
                var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                    return new bootstrap.Tooltip(tooltipTriggerEl)
                });
            }, false);
        })();
    </script>
    <!-- particles.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Inicialização do particles.js -->
    <script>
        // Carrega a config diretamente via objeto (sem arquivo externo)
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.15, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.15, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" },
                    "onclick": { "enable": false }
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 0.25 } }
                }
            },
            "retina_detect": true
        });
    </script>

</body>

</html>
