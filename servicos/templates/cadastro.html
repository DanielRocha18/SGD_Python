<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#01428d">
    <meta name="author" content="Victor Oliveira Carvalho">

    <title>Cadastro - Sistema de Demandas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <link href="{{url_for('static', filename='css/sb-admin-2.css')}}" rel="stylesheet">
    <link href="{{url_for('static', filename='css/style-login.css')}}" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="{{url_for('static', filename='img/favicon.png')}}">
</head>

<body>
    <div id="particles-js" aria-hidden="true"></div>

    <div class="login-container">
        <div class="formulario-login" style="max-width: 450px;"> <div class="login-header">
                <div class="logo-container2">
                    <img src="{{ url_for('static', filename='img/logo_central_azul.png') }}" alt="Logo" class="logo-img">
                </div>
                <h4 style="color: #0061a6; margin-top: 15px; font-weight: 700;">Criar Nova Conta</h4>
            </div>

            <br>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'message' else 'danger' }} alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{url_for('cadastro')}}" method="post" class="needs-validation" novalidate>
                
                <div class="form-floating mb-3">
                    <input type="text" class="form-control custom-input" id="nome" name="nome"
                        placeholder="Seu nome completo" required>
                    <label for="nome"><i class="fas fa-id-card icon-left"></i>Nome Completo</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control custom-input" id="email" name="email"
                        placeholder="seu@email.com" required>
                    <label for="email"><i class="fas fa-envelope icon-left"></i>E-mail</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control custom-input" id="usuario" name="usuario"
                        placeholder="Nome de usuário" required>
                    <label for="usuario"><i class="fas fa-user icon-left"></i>Usuário</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" class="form-control custom-input" id="senha" name="senha"
                        placeholder="Sua senha" minlength="6" required>
                    <label for="senha"><i class="fas fa-lock icon-left"></i>Senha</label>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-login" type="submit">
                        Cadastrar Conta
                    </button>
                </div>
                
                <div class="text-center mt-3">
                    <span style="color: #666;">Já tem uma conta?</span>
                    <a href="{{url_for('login')}}" style="color: #0061a6; font-weight: bold; text-decoration: none;">Faça Login</a>
                </div>
            </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        (function () {
            'use strict';
            window.addEventListener('load', function () {
                var forms = document.getElementsByClassName('needs-validation');
                var validation = Array.prototype.filter.call(forms, function (form) {
                    form.addEventListener('submit', function (event) {
                        if (form.checkValidity() === false) {
                            event.preventDefault();
                            event.stopPropagation();
                        }
                        form.classList.add('was-validated');
                    }, false);
                });
            }, false);
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.15, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.15, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" },
                    "onclick": { "enable": false }
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 0.25 } }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
